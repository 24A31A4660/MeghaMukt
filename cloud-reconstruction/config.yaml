# =============================================================================
# Cloud Reconstruction System — Configuration (Swin U-Net)
# =============================================================================
# All hyperparameters, paths, and settings are defined here.
# Do NOT hardcode values in Python files — read from this config instead.

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset:
  # Root folder containing SAFE files
  source_dir: "../dataset"
  # Where extracted patches will be saved
  output_dir: "dataset"
  # Include medium-cloud scenes (10-70%) as additional training data
  include_medium: true
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15
  # Seed for reproducible splits
  random_seed: 42

# ---------------------------------------------------------------------------
# Bands
# ---------------------------------------------------------------------------
bands:
  # Optical bands to extract from each .SAFE.zip
  # B02/B03/B04/B08 at 10m, B11/B12 at 20m (upsampled to target_resolution)
  optical:
    - B02   # Blue
    - B03   # Green
    - B04   # Red
    - B08   # NIR
    - B11   # SWIR1 (upsampled from 20m)
    - B12   # SWIR2 (upsampled from 20m)
  # Scene Classification Layer used to generate cloud masks
  cloud_band: SCL
  # Target resolution in metres (all bands resampled to this)
  target_resolution: 10
  # Number of optical input channels (len(optical))
  n_optical: 6

# ---------------------------------------------------------------------------
# Sentinel-1 (future integration — set enabled: true when SAR data available)
# ---------------------------------------------------------------------------
sentinel1:
  enabled: false
  channels: 2          # VV + VH polarization
  # Path to paired S1 data when enabled
  data_dir: null

# ---------------------------------------------------------------------------
# Patch Extraction
# ---------------------------------------------------------------------------
patch:
  size: 256            # Training patch size (256x256 recommended for RTX 4050)
  stride: 128          # 50% overlap during extraction
  min_cloud_fraction: 0.05
  max_cloud_fraction: 0.99

# ---------------------------------------------------------------------------
# Model — Swin U-Net (Swin Transformer Tiny)
# ---------------------------------------------------------------------------
model:
  # Model architecture: "swin_unet" | "unet"
  name: swin_unet
  # Input channels = n_optical + 1 (cloud mask) [+ sentinel1.channels if enabled]
  input_channels: 7
  # Output channels: reconstruct all optical bands
  output_channels: 6
  # Swin Transformer configuration
  embed_dim: 96                  # Base embedding dimension (Swin-T = 96)
  depths: [2, 2, 6, 2]          # Number of transformer blocks per encoder stage
  num_heads: [3, 6, 12, 24]     # Attention heads per stage
  window_size: 8                # Window size for shifted-window attention
  patch_size: 4                 # Patch embedding spatial size (not training patch!)
  pretrained: true              # Load ImageNet Swin-T weights for encoder
  drop_path_rate: 0.1           # Stochastic depth rate
  gradient_checkpointing: true  # Reduce VRAM ~30-40% (recomputes activations on backward)

# ---------------------------------------------------------------------------
# Training — Optimized for RTX 4050 Laptop GPU (6GB VRAM)
# ---------------------------------------------------------------------------
training:
  epochs: 200
  batch_size: 4                  # Hardware batch (6GB VRAM constraint)
  gradient_accumulation: 4       # Effective batch size = 4 × 4 = 16
  learning_rate: 0.0003          # 3e-4 (AdamW)
  weight_decay: 0.00001          # 1e-5
  optimizer: adamw
  # Automatic Mixed Precision (requires CUDA)
  amp: true
  # Gradient clipping norm
  grad_clip: 1.0
  # Early stopping: stop if val_loss doesn't improve for N epochs
  early_stopping_patience: 15
  # Save checkpoint every N epochs (independent of best-model saving)
  checkpoint_interval: 5
  # Resume from latest checkpoint if it exists
  resume: true
  # DataLoader workers (2 is stable on Windows with persistent_workers)
  num_workers: 2
  # Pin memory for faster GPU transfer
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

# ---------------------------------------------------------------------------
# Loss Weights
# ---------------------------------------------------------------------------
loss:
  l1:           0.5     # Pixel MAE — primary cloud-region objective
  ssim:         0.3     # Structural similarity (full image)
  perceptual:   0.1     # VGG16 feature matching (cloud region)
  charbonnier:  0.1     # Smooth L1 / edge-preserving (cloud region)
  spectral:     0.05    # Spectral consistency: NDVI + SR + Green/SWIR ratios
                        # Total = 1.05 (intentionally additive at small scale)

# ---------------------------------------------------------------------------
# Device
# ---------------------------------------------------------------------------
device:
  # "cuda" | "cpu" | "auto" (auto selects cuda if available)
  type: auto
  # CUDA device index (if multiple GPUs)
  cuda_id: 0

# ---------------------------------------------------------------------------
# Inference
# ---------------------------------------------------------------------------
inference:
  # Inference uses larger sliding window than training patches for better context
  patch_size: 256      # Changed to 256 to support 256x256 png uploads from the dashboard
  stride: 256          # ~33% overlap for smooth blending
  # Gaussian weight blending at patch overlaps
  blend_overlap: true
  # Generate per-pixel confidence map
  output_confidence: true
  # Cloud fraction threshold below which image is considered "clear"
  clear_threshold: -1.0
  # Batch inference: process multiple images at once
  batch_mode: false
  batch_dir: null

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  dir: "outputs"
  # Save multi-band GeoTIFF (all optical bands, preserves CRS/transform)
  save_multiband_geotiff: true
  # Save RGB JPEG for web visualisation
  save_rgb_preview: true
  # Save individual output files
  save_cloud_mask: true
  save_confidence_map: true
  save_difference_map: true
  save_metrics_json: true
  save_processing_log: true
  # 7-panel comparison image
  save_comparison_preview: true

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  checkpoints: "checkpoints_swin"
  logs:        "logs"
  outputs:     "outputs"
  tensorboard: "logs/tensorboard"
