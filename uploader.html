<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeghaMukt — Mission Control Center</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: {
                            deep: '#030712',
                            dark: '#0b1329',
                            mid: '#1c2541',
                        },
                        aurora: {
                            cyan: '#00e5ff',
                            green: '#39ff14',
                            glow: 'rgba(0, 229, 255, 0.15)'
                        }
                    },
                    fontFamily: {
                        heading: ['Syncopate', 'Syne', 'sans-serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syncopate:wght@700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React and ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body, #root {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b1329;
        }
        ::-webkit-scrollbar-thumb {
            background: #1c2541;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00e5ff;
        }
        .glassmorphism {
            background: rgba(11, 19, 41, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 229, 255, 0.1);
        }
        .glow-cyan:hover {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.35);
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="root">
        <!-- Pre-render loading skeleton shown while Babel compiles JSX -->
        <div id="babel-loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020712;color:#00e5ff;font-family:monospace;gap:16px;">
            <svg width="48" height="48" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation:spin 1.5s linear infinite">
                <circle cx="20" cy="20" r="8" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
                <ellipse cx="20" cy="20" rx="18" ry="8" stroke="#00e5ff" stroke-width="1" fill="none" transform="rotate(-30 20 20)" opacity="0.5"/>
                <circle cx="20" cy="20" r="3" fill="#00e5ff"/>
            </svg>
            <span style="font-size:13px;letter-spacing:0.2em;opacity:0.7;">MEGHAMUKT — INITIALIZING MISSION CONTROL</span>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel" src="js/Dashboard.jsx?v=2026"></script>
</body>
</html>
